services:
  - type: web
    name: ai-talent-scout
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: N8N_HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: N8N_PORT
        value: 10000
      - key: N8N_PROTOCOL
        value: https
      - key: WEBHOOK_URL
        value: https://ai-talent-scouting-agent.onrender.com
      - key: N8N_ENCRYPTION_KEY
        value: mySecretKey12345abcdef
      - key: N8N_BASIC_AUTH_ACTIVE
        value: true
      - key: N8N_BASIC_AUTH_USER
        value: admin
      - key: N8N_BASIC_AUTH_PASSWORD
        value: admin123
      - key: NODE_ENV
        value: production
      - key: N8N_DIAGNOSTICS_ENABLED
        value: false
